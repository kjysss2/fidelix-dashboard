name: Build and deploy GitHub Pages

on:
  workflow_dispatch:
  schedule:
    # 08:05 KST = 23:05 UTC on the previous day
    - cron: "5 23 * * *"
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build static dashboard
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          HOST: 127.0.0.1
          PORT: 8765
          REFRESH_AT: "08:00"
          REFRESH_ON_STARTUP: "0"
          ENABLE_CHINA_IDC: "0"
        run: python build_pages.py

      - name: Persist DRAM spot price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/spot_history.json
          git diff --cached --quiet || git commit -m "Update DRAM spot price history"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
